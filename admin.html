<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin · Propiedades</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#14151a; --ink-soft:#3a3d47; --muted:#8a8f9c; --line:#e7e4dc;
    --canvas:#f6f4ee; --card:#fff; --gold:#d9a526; --gold-deep:#b9851a;
    --green:#2e9e4f; --red:#e0483b;
    --shadow:0 1px 2px rgba(20,21,26,.04),0 6px 20px rgba(20,21,26,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--canvas);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1100px;margin:0 auto;padding:28px 24px 64px}
  header.top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:26px}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .dot{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--gold),var(--gold-deep));display:grid;place-items:center;color:#fff;font-size:18px;box-shadow:var(--shadow)}
  .brand h1{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;letter-spacing:-.02em}
  .brand p{font-size:12px;color:var(--muted)}
  .nav a{font-size:13px;color:var(--ink-soft);text-decoration:none;font-weight:600;padding:8px 14px;border-radius:9px;border:1px solid var(--line);background:#fff}
  .nav a+a{margin-left:8px}

  .btn{font-family:inherit;font-size:13px;font-weight:600;padding:10px 16px;border-radius:10px;border:none;cursor:pointer}
  .btn.primary{background:var(--ink);color:#fff}
  .btn.gold{background:var(--gold);color:#fff}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink-soft)}
  .btn.danger{background:#fff;border:1px solid #f0c9c4;color:var(--red)}
  .btn:active{transform:translateY(1px)}

  /* Gate de contraseña */
  .gate{max-width:380px;margin:80px auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:28px;box-shadow:var(--shadow);text-align:center}
  .gate h2{font-family:'Space Grotesk',sans-serif;font-size:18px;margin-bottom:8px}
  .gate p{font-size:13px;color:var(--muted);margin-bottom:18px}
  input,select,textarea{font-family:inherit;font-size:14px;width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold)}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .toolbar h2{font-family:'Space Grotesk',sans-serif;font-size:16px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .prop{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}
  .prop .img{height:150px;background:#eee center/cover no-repeat;position:relative}
  .prop .img .badge{position:absolute;top:8px;left:8px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;background:rgba(20,21,26,.8);color:#fff}
  .prop .img .nodisp{position:absolute;top:8px;right:8px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;background:var(--red);color:#fff}
  .prop .body{padding:14px;flex:1;display:flex;flex-direction:column;gap:6px}
  .prop .body h3{font-family:'Space Grotesk',sans-serif;font-size:15px;line-height:1.3}
  .prop .price{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--gold-deep)}
  .prop .specs{font-size:12px;color:var(--muted)}
  .prop .desc{font-size:12.5px;color:var(--ink-soft);flex:1}
  .prop .acts{display:flex;gap:8px;padding:0 14px 14px}
  .prop .acts .btn{flex:1;padding:8px;font-size:12px}
  .empty{padding:50px;text-align:center;color:var(--muted);background:#fff;border:1px dashed var(--line);border-radius:14px}

  /* Modal form */
  .overlay{position:fixed;inset:0;background:rgba(20,21,26,.45);display:none;align-items:flex-start;justify-content:center;padding:30px 16px;z-index:50;overflow-y:auto}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:18px;width:100%;max-width:520px;box-shadow:0 24px 60px rgba(0,0,0,.25)}
  .modal .mhead{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal .mhead h3{font-family:'Space Grotesk',sans-serif;font-size:17px}
  .close{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer}
  .form{padding:18px 22px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form .full{grid-column:1/3}
  .form label{font-size:12px;color:var(--muted);font-weight:600;display:block;margin-bottom:4px}
  .form .row label .hint{font-weight:400;color:var(--muted)}
  .checkrow{display:flex;align-items:center;gap:8px}
  .checkrow input{width:auto}
  .factions{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .2s;z-index:100}
  .toast.show{opacity:1}
</style>
</head>
<body>

<!-- Gate -->
<div id="gate" class="gate">
  <h2>Panel de propiedades 🔑</h2>
  <p>Escribe la contraseña de administrador para entrar.</p>
  <input id="passInput" type="password" placeholder="Contraseña" onkeydown="if(event.key==='Enter')entrar()" />
  <div style="height:12px"></div>
  <button class="btn gold" style="width:100%" onclick="entrar()">Entrar</button>
  <p id="gateErr" style="color:var(--red);margin-top:10px;display:none">Contraseña incorrecta</p>
</div>

<!-- App -->
<div id="app" class="wrap" style="display:none">
  <header class="top">
    <div class="brand">
      <div class="dot">◆</div>
      <div><h1 id="agencyName">Propiedades</h1><p>Panel de administración</p></div>
    </div>
    <div class="nav">
      <a href="/dashboard">← Dashboard</a>
    </div>
  </header>

  <div class="toolbar">
    <h2 id="count">Propiedades</h2>
    <button class="btn gold" onclick="abrirNueva()">+ Agregar propiedad</button>
  </div>

  <div id="grid" class="grid"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mhead"><h3 id="modalTitle">Nueva propiedad</h3><button class="close" onclick="cerrar()">×</button></div>
    <div class="form">
      <div class="full"><label>Título</label><input id="f_titulo" placeholder="Ej. Depto de lujo en Polanco" /></div>
      <div><label>Zona</label>
        <select id="f_zona">
          <option value="polanco">Polanco</option>
          <option value="chapultepec">Lomas / Chapultepec</option>
          <option value="reforma">Reforma</option>
          <option value="condesa">Condesa / Roma</option>
          <option value="delvalle">Del Valle</option>
          <option value="santafe">Santa Fe</option>
        </select>
      </div>
      <div><label>Tipo</label>
        <select id="f_tipo">
          <option value="departamento">Departamento</option>
          <option value="casa">Casa</option>
          <option value="terreno">Terreno</option>
          <option value="oficina">Oficina</option>
        </select>
      </div>
      <div><label>Operación</label>
        <select id="f_operacion"><option value="venta">Venta</option><option value="renta">Renta</option></select>
      </div>
      <div><label>Precio (MXN)</label><input id="f_precio" type="number" placeholder="5200000" /></div>
      <div><label>Recámaras</label><input id="f_recamaras" type="number" placeholder="2" /></div>
      <div><label>Baños</label><input id="f_banos" type="number" placeholder="2" /></div>
      <div class="full"><label>Metros cuadrados (m²)</label><input id="f_m2" type="number" placeholder="95" /></div>
      <div class="full"><label>Descripción</label><textarea id="f_descripcion" rows="2" placeholder="Edificio con amenidades, listo para habitar..."></textarea></div>
      <div class="full"><label>Imágenes <span class="hint">(una URL por línea)</span></label><textarea id="f_imagenes" rows="2" placeholder="https://...jpg"></textarea></div>
      <div class="full checkrow"><input id="f_disponible" type="checkbox" checked /><label style="margin:0">Disponible</label></div>
    </div>
    <div class="factions">
      <button class="btn ghost" onclick="cerrar()">Cancelar</button>
      <button class="btn primary" onclick="guardar()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let PASS = "";
  let editandoId = null;
  const fmt = (n) => "$" + (Number(n)||0).toLocaleString("es-MX");
  const zonaNombre = {polanco:"Polanco",chapultepec:"Lomas/Chapultepec",reforma:"Reforma",condesa:"Condesa/Roma",delvalle:"Del Valle",santafe:"Santa Fe"};

  function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200)}

  async function entrar(){
    PASS = document.getElementById("passInput").value.trim();
    // Probar la contraseña creando una request de validación inocua (listar es libre, así que probamos con un PUT falso no; mejor validamos al guardar). Validamos con un ping a crear/borrar no. Simplemente entramos y validará al guardar.
    if(!PASS){return}
    document.getElementById("gate").style.display="none";
    document.getElementById("app").style.display="block";
    cargar();
  }

  async function cargar(){
    try{
      const r = await fetch("/api/properties");
      const data = await r.json();
      const props = data.properties || [];
      document.getElementById("count").textContent = `Propiedades (${props.length})`;
      // nombre agencia
      try{const lr=await fetch("/api/leads");const ld=await lr.json();if(ld.config?.nombreAgencia)document.getElementById("agencyName").textContent=ld.config.nombreAgencia;}catch(e){}
      const grid = document.getElementById("grid");
      if(!props.length){grid.innerHTML='<div class="empty" style="grid-column:1/-1">Aún no hay propiedades. Dale a «+ Agregar propiedad» para registrar la primera.</div>';return}
      grid.innerHTML = props.map(p=>{
        const img = (p.imagenes&&p.imagenes[0])||"";
        return `<div class="prop">
          <div class="img" style="background-image:url('${img}')">
            <span class="badge">${p.operacion==='renta'?'Renta':'Venta'}</span>
            ${p.disponible===false?'<span class="nodisp">No disponible</span>':''}
          </div>
          <div class="body">
            <h3>${p.titulo}</h3>
            <div class="price">${fmt(p.precio)}${p.operacion==='renta'?'/mes':''}</div>
            <div class="specs">${zonaNombre[p.zona]||p.zona||'—'} · ${p.recamaras} rec · ${p.banos} baños · ${p.m2} m²</div>
            <div class="desc">${p.descripcion||''}</div>
          </div>
          <div class="acts">
            <button class="btn ghost" onclick='editar(${JSON.stringify(p)})'>Editar</button>
            <button class="btn danger" onclick="borrar('${p.id}')">Borrar</button>
          </div>
        </div>`;
      }).join("");
    }catch(e){toast("Error al cargar")}
  }

  function abrirNueva(){
    editandoId=null;
    document.getElementById("modalTitle").textContent="Nueva propiedad";
    ["titulo","precio","recamaras","banos","m2","descripcion","imagenes"].forEach(k=>document.getElementById("f_"+k).value="");
    document.getElementById("f_zona").value="polanco";
    document.getElementById("f_tipo").value="departamento";
    document.getElementById("f_operacion").value="venta";
    document.getElementById("f_disponible").checked=true;
    document.getElementById("overlay").classList.add("show");
  }

  function editar(p){
    editandoId=p.id;
    document.getElementById("modalTitle").textContent="Editar propiedad";
    document.getElementById("f_titulo").value=p.titulo||"";
    document.getElementById("f_zona").value=p.zona||"polanco";
    document.getElementById("f_tipo").value=p.tipo||"departamento";
    document.getElementById("f_operacion").value=p.operacion||"venta";
    document.getElementById("f_precio").value=p.precio||"";
    document.getElementById("f_recamaras").value=p.recamaras||"";
    document.getElementById("f_banos").value=p.banos||"";
    document.getElementById("f_m2").value=p.m2||"";
    document.getElementById("f_descripcion").value=p.descripcion||"";
    document.getElementById("f_imagenes").value=(p.imagenes||[]).join("\n");
    document.getElementById("f_disponible").checked=p.disponible!==false;
    document.getElementById("overlay").classList.add("show");
  }

  function cerrar(){document.getElementById("overlay").classList.remove("show")}

  async function guardar(){
    const body = {
      titulo: document.getElementById("f_titulo").value.trim(),
      zona: document.getElementById("f_zona").value,
      tipo: document.getElementById("f_tipo").value,
      operacion: document.getElementById("f_operacion").value,
      precio: document.getElementById("f_precio").value,
      recamaras: document.getElementById("f_recamaras").value,
      banos: document.getElementById("f_banos").value,
      m2: document.getElementById("f_m2").value,
      descripcion: document.getElementById("f_descripcion").value.trim(),
      imagenes: document.getElementById("f_imagenes").value.split("\n").map(s=>s.trim()).filter(Boolean),
      disponible: document.getElementById("f_disponible").checked,
    };
    if(!body.titulo){toast("Ponle un título");return}
    const url = editandoId ? "/api/properties/"+editandoId : "/api/properties";
    const method = editandoId ? "PUT" : "POST";
    try{
      const r = await fetch(url,{method,headers:{"Content-Type":"application/json","x-admin-password":PASS},body:JSON.stringify(body)});
      if(r.status===401){toast("Contraseña incorrecta");return}
      if(!r.ok){toast("Error al guardar");return}
      cerrar();toast(editandoId?"Propiedad actualizada":"Propiedad agregada");cargar();
    }catch(e){toast("Error de conexión")}
  }

  async function borrar(id){
    if(!confirm("¿Borrar esta propiedad?"))return;
    try{
      const r = await fetch("/api/properties/"+id,{method:"DELETE",headers:{"x-admin-password":PASS}});
      if(r.status===401){toast("Contraseña incorrecta");return}
      toast("Propiedad borrada");cargar();
    }catch(e){toast("Error de conexión")}
  }

  document.getElementById("overlay").addEventListener("click",e=>{if(e.target.id==="overlay")cerrar()});
</script>
</body>
</html>
