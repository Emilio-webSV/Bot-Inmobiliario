<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panel de Leads · Bot Inmobiliario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #14151a;
    --ink-soft: #3a3d47;
    --muted: #8a8f9c;
    --line: #e7e4dc;
    --canvas: #f6f4ee;
    --card: #ffffff;
    --gold: #d9a526;
    --gold-deep: #b9851a;
    --hot: #e0483b;
    --hot-bg: #fde9e7;
    --warm: #e0951f;
    --warm-bg: #fbf0db;
    --cold: #4a7fb5;
    --cold-bg: #e7eff7;
    --shadow: 0 1px 2px rgba(20,21,26,.04), 0 6px 20px rgba(20,21,26,.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--canvas);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 24px 64px; }

  header.top {
    display: flex; align-items: baseline; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; margin-bottom: 28px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .dot {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, var(--gold), var(--gold-deep));
    display: grid; place-items: center; color: #fff; font-size: 18px;
    box-shadow: var(--shadow);
  }
  .brand h1 {
    font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700;
    letter-spacing: -.02em;
  }
  .brand p { font-size: 12px; color: var(--muted); }
  .updated { font-size: 12px; color: var(--muted); }
  .updated b { color: var(--ink-soft); font-weight: 600; }

  /* Métricas */
  .metrics { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 30px; }
  .metric {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 18px 18px 16px; box-shadow: var(--shadow);
  }
  .metric .label { font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: .01em; }
  .metric .num {
    font-family: 'Space Grotesk', sans-serif; font-size: 30px; font-weight: 700;
    letter-spacing: -.03em; margin-top: 6px;
  }
  .metric.pipe { grid-column: span 1; }
  .metric .num.small { font-size: 22px; }
  .metric.hot .num { color: var(--hot); }
  .metric.warm .num { color: var(--warm); }
  .metric.cold .num { color: var(--cold); }
  .metric .bar { height: 3px; border-radius: 2px; margin-top: 12px; background: var(--line); overflow: hidden; }
  .metric .bar i { display: block; height: 100%; }
  .metric.hot .bar i { background: var(--hot); }
  .metric.warm .bar i { background: var(--warm); }
  .metric.cold .bar i { background: var(--cold); }
  .metric.pipe .bar i { background: var(--gold); }

  /* Tabla de leads */
  .panel { background: var(--card); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; }
  .panel h2 {
    font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600;
    padding: 18px 20px; border-bottom: 1px solid var(--line);
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
    color: var(--muted); font-weight: 600; padding: 11px 20px; background: #faf8f3;
    border-bottom: 1px solid var(--line);
  }
  tbody td { padding: 14px 20px; border-bottom: 1px solid var(--line); font-size: 14px; vertical-align: middle; }
  tbody tr { cursor: pointer; transition: background .12s; }
  tbody tr:hover { background: #faf8f3; }
  tbody tr:last-child td { border-bottom: none; }
  .name { font-weight: 600; }
  .sub { font-size: 12px; color: var(--muted); }

  .temp { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 99px; }
  .temp.caliente { color: var(--hot); background: var(--hot-bg); }
  .temp.tibio { color: var(--warm-deep, #a96a10); background: var(--warm-bg); }
  .temp.frio { color: var(--cold); background: var(--cold-bg); }
  .temp .pip { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

  .score { display: flex; align-items: center; gap: 8px; }
  .gauge { width: 54px; height: 6px; border-radius: 4px; background: var(--line); overflow: hidden; }
  .gauge i { display: block; height: 100%; border-radius: 4px; }
  .score b { font-family: 'Space Grotesk', sans-serif; font-size: 13px; min-width: 22px; }

  .tag-control { font-size: 11px; font-weight: 600; color: var(--gold-deep); background: #fbf3dd; padding: 2px 8px; border-radius: 6px; }

  .empty { padding: 50px 20px; text-align: center; color: var(--muted); }
  .empty p:first-child { font-family: 'Space Grotesk', sans-serif; font-size: 16px; color: var(--ink-soft); margin-bottom: 6px; }

  /* Modal detalle */
  .overlay { position: fixed; inset: 0; background: rgba(20,21,26,.45); display: none; align-items: flex-start; justify-content: center; padding: 40px 20px; z-index: 50; }
  .overlay.show { display: flex; }
  .modal { background: var(--card); border-radius: 18px; width: 100%; max-width: 560px; max-height: 86vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 24px 60px rgba(0,0,0,.25); }
  .modal .mhead { padding: 20px 22px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: flex-start; }
  .modal .mhead h3 { font-family: 'Space Grotesk', sans-serif; font-size: 18px; }
  .modal .mhead .sub { margin-top: 3px; }
  .close { background: none; border: none; font-size: 22px; color: var(--muted); cursor: pointer; line-height: 1; }
  .profile { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px 18px; padding: 16px 22px; border-bottom: 1px solid var(--line); }
  .profile div span { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; display: block; }
  .profile div b { font-size: 14px; font-weight: 600; }
  .chat { padding: 16px 22px; overflow-y: auto; flex: 1; background: #faf8f3; }
  .msg { max-width: 80%; padding: 9px 13px; border-radius: 13px; font-size: 13.5px; margin-bottom: 10px; }
  .msg.user { background: #fff; border: 1px solid var(--line); border-bottom-left-radius: 4px; }
  .msg.bot { background: var(--ink); color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
  .msg .t { display: block; font-size: 10px; opacity: .55; margin-top: 4px; }
  .actions { padding: 14px 22px; border-top: 1px solid var(--line); display: flex; gap: 10px; }
  .btn { font-family: inherit; font-size: 13px; font-weight: 600; padding: 10px 16px; border-radius: 10px; border: none; cursor: pointer; flex: 1; }
  .btn.primary { background: var(--ink); color: #fff; }
  .btn.ghost { background: #fff; border: 1px solid var(--line); color: var(--ink-soft); }
  .btn:active { transform: translateY(1px); }

  @media (max-width: 860px) {
    .metrics { grid-template-columns: repeat(2,1fr); }
    .hide-sm { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="dot">◆</div>
      <div>
        <h1 id="agencyName">Panel de Leads</h1>
        <p>Bot inmobiliario · seguimiento en vivo</p>
      </div>
    </div>
    <div class="updated">Actualizado <b id="clock">—</b> · se refresca solo</div>
  </header>

  <section class="metrics" id="metrics"></section>

  <div class="panel">
    <h2>Leads por prioridad</h2>
    <div id="tableHost">
      <div class="empty"><p>Cargando…</p></div>
    </div>
  </div>
</div>

<!-- Modal detalle -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mhead">
      <div>
        <h3 id="mName">—</h3>
        <p class="sub" id="mPhone">—</p>
      </div>
      <button class="close" onclick="cerrarModal()">×</button>
    </div>
    <div class="profile" id="mProfile"></div>
    <div class="chat" id="mChat"></div>
    <div class="actions" id="mActions"></div>
  </div>
</div>

<script>
  const fmtMXN = (n) => "$" + (n || 0).toLocaleString("es-MX");
  const zonaNombre = {
    polanco: "Polanco", chapultepec: "Lomas/Chapultepec", reforma: "Reforma",
    condesa: "Condesa/Roma", delvalle: "Del Valle", santafe: "Santa Fe",
  };
  const tempColor = { caliente: "var(--hot)", tibio: "var(--warm)", frio: "var(--cold)" };
  let agentesById = {};
  let leadActual = null;

  async function cargar() {
    try {
      const r = await fetch("/api/leads");
      const data = await r.json();
      agentesById = data.agentesById || {};
      if (data.config?.nombreAgencia) {
        document.getElementById("agencyName").textContent = data.config.nombreAgencia;
      }
      pintarMetricas(data.metricas);
      pintarTabla(data.leads);
      document.getElementById("clock").textContent =
        new Date().toLocaleTimeString("es-MX", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    } catch (e) {
      document.getElementById("tableHost").innerHTML =
        '<div class="empty"><p>No pude conectar con el servidor</p><p class="sub">Revisa que el bot esté corriendo.</p></div>';
    }
  }

  function pintarMetricas(m) {
    const total = m.total || 1;
    document.getElementById("metrics").innerHTML = `
      <div class="metric"><div class="label">Leads totales</div><div class="num">${m.total}</div><div class="bar"><i style="width:100%;background:var(--ink)"></i></div></div>
      <div class="metric hot"><div class="label">🔴 Calientes</div><div class="num">${m.calientes}</div><div class="bar"><i style="width:${(m.calientes/total*100)}%"></i></div></div>
      <div class="metric warm"><div class="label">🟡 Tibios</div><div class="num">${m.tibios}</div><div class="bar"><i style="width:${(m.tibios/total*100)}%"></i></div></div>
      <div class="metric cold"><div class="label">🔵 Fríos</div><div class="num">${m.frios}</div><div class="bar"><i style="width:${(m.frios/total*100)}%"></i></div></div>
      <div class="metric pipe"><div class="label">💰 Pipeline potencial</div><div class="num small">${fmtMXN(m.pipeline)}</div><div class="bar"><i style="width:100%"></i></div></div>`;
  }

  function pintarTabla(leads) {
    if (!leads.length) {
      document.getElementById("tableHost").innerHTML =
        '<div class="empty"><p>Aún no hay leads</p><p class="sub">En cuanto un cliente escriba por WhatsApp, aparecerá aquí.</p></div>';
      return;
    }
    const filas = leads.map((l) => {
      const agente = l.agenteAsignado ? (agentesById[l.agenteAsignado] || "—") : "Sin asignar";
      const zona = l.perfil?.zona ? (zonaNombre[l.perfil.zona] || l.perfil.zona) : "—";
      const pres = l.perfil?.presupuesto ? fmtMXN(l.perfil.presupuesto) : "—";
      return `
        <tr onclick='abrirModal("${l.telefono}")'>
          <td>
            <div class="name">${l.nombre || "Sin nombre"} ${l.humanoEnControl ? '<span class="tag-control">agente</span>' : ''}</div>
            <div class="sub">${l.telefono}</div>
          </td>
          <td><span class="temp ${l.temperatura}"><span class="pip"></span>${l.temperatura}</span></td>
          <td><div class="score"><div class="gauge"><i style="width:${l.score}%;background:${tempColor[l.temperatura]}"></i></div><b>${l.score}</b></div></td>
          <td class="hide-sm">${zona}</td>
          <td class="hide-sm">${pres}</td>
          <td class="hide-sm sub">${agente}</td>
        </tr>`;
    }).join("");

    document.getElementById("tableHost").innerHTML = `
      <table>
        <thead><tr>
          <th>Cliente</th><th>Temp.</th><th>Score</th>
          <th class="hide-sm">Zona</th><th class="hide-sm">Presupuesto</th><th class="hide-sm">Agente</th>
        </tr></thead>
        <tbody>${filas}</tbody>
      </table>`;
  }

  async function abrirModal(telefono) {
    const r = await fetch("/api/leads/" + telefono);
    const l = await r.json();
    leadActual = l;
    document.getElementById("mName").textContent = l.nombre || "Sin nombre";
    document.getElementById("mPhone").textContent = l.telefono;

    const p = l.perfil || {};
    document.getElementById("mProfile").innerHTML = `
      <div><span>Temperatura</span><b style="color:${tempColor[l.temperatura]}">${l.temperatura} (${l.score})</b></div>
      <div><span>Zona</span><b>${p.zona ? (zonaNombre[p.zona]||p.zona) : "—"}</b></div>
      <div><span>Presupuesto</span><b>${p.presupuesto ? fmtMXN(p.presupuesto) : "—"}</b></div>
      <div><span>Recámaras</span><b>${p.recamaras || "—"}</b></div>
      <div><span>Propósito</span><b>${p.proposito || "—"}</b></div>
      <div><span>Agente</span><b>${l.agenteAsignado ? (agentesById[l.agenteAsignado]||"—") : "Sin asignar"}</b></div>`;

    document.getElementById("mChat").innerHTML = (l.historial || []).map((h) => {
      const hora = new Date(h.ts).toLocaleTimeString("es-MX", { hour: "2-digit", minute: "2-digit" });
      return `<div class="msg ${h.rol}">${h.texto}<span class="t">${hora}</span></div>`;
    }).join("") || '<p class="empty sub">Sin mensajes aún.</p>';

    pintarAcciones(l);
    document.getElementById("overlay").classList.add("show");
  }

  function pintarAcciones(l) {
    if (l.humanoEnControl) {
      document.getElementById("mActions").innerHTML =
        `<button class="btn primary" onclick="devolverControl('${l.telefono}')">Devolver al bot</button>`;
    } else {
      document.getElementById("mActions").innerHTML =
        `<button class="btn primary" onclick="tomarControl('${l.telefono}')">Tomar control de la conversación</button>
         <a class="btn ghost" style="text-decoration:none;text-align:center" href="https://wa.me/${l.telefono}" target="_blank">Escribir por WhatsApp</a>`;
    }
  }

  async function tomarControl(telefono) {
    await fetch(`/api/leads/${telefono}/tomar-control`, { method: "POST" });
    abrirModal(telefono); cargar();
  }
  async function devolverControl(telefono) {
    await fetch(`/api/leads/${telefono}/devolver-control`, { method: "POST" });
    abrirModal(telefono); cargar();
  }
  function cerrarModal() { document.getElementById("overlay").classList.remove("show"); }
  document.getElementById("overlay").addEventListener("click", (e) => {
    if (e.target.id === "overlay") cerrarModal();
  });

  cargar();
  setInterval(cargar, 15000); // refresco cada 15s
</script>
</body>
</html>
