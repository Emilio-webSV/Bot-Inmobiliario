<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CRM Inmobiliario · Leads</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14151a;--ink-soft:#3a3d47;--muted:#8a8f9c;--line:#e7e4dc;--canvas:#f6f4ee;--card:#fff;
    --gold:#d9a526;--gold-deep:#b9851a;
    --hot:#e0483b;--hot-bg:#fde9e7;--warm:#e0951f;--warm-bg:#fbf0db;--cold:#4a7fb5;--cold-bg:#e7eff7;
    --green:#2e9e4f;--green-bg:#e8f3ec;
    --shadow:0 1px 2px rgba(20,21,26,.04),0 6px 20px rgba(20,21,26,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--canvas);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:24px 24px 64px}
  .hidden{display:none}

  /* Gate de acceso */
  .gate{max-width:380px;margin:90px auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:30px;box-shadow:var(--shadow);text-align:center}
  .gate .dot{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--gold),var(--gold-deep));display:grid;place-items:center;color:#fff;font-size:22px;margin:0 auto 16px}
  .gate h2{font-family:'Space Grotesk',sans-serif;font-size:19px;margin-bottom:8px}
  .gate p{font-size:13px;color:var(--muted);margin-bottom:18px}
  .gate input{font-family:inherit;font-size:14px;width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px}
  .gate input:focus{outline:none;border-color:var(--gold)}
  .gate button{font-family:inherit;font-size:14px;font-weight:600;width:100%;margin-top:12px;padding:12px;border-radius:10px;border:none;background:var(--ink);color:#fff;cursor:pointer}

  header.top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:18px}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .dot{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--gold),var(--gold-deep));display:grid;place-items:center;color:#fff;font-size:18px;box-shadow:var(--shadow)}
  .brand h1{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;letter-spacing:-.02em}
  .brand p{font-size:12px;color:var(--muted)}
  .updated{font-size:12px;color:var(--muted)}
  .updated b{color:var(--ink-soft);font-weight:600}

  .nav{display:flex;gap:8px;margin-bottom:24px}
  .nav a{font-size:13px;color:var(--ink-soft);text-decoration:none;font-weight:600;padding:9px 16px;border-radius:10px;border:1px solid var(--line);background:#fff}
  .nav a.active{background:var(--ink);color:#fff;border-color:var(--ink)}

  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:12px;margin-bottom:28px}
  .metric{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 16px 14px;box-shadow:var(--shadow)}
  .metric .label{font-size:11.5px;color:var(--muted);font-weight:500}
  .metric .num{font-family:'Space Grotesk',sans-serif;font-size:27px;font-weight:700;letter-spacing:-.03em;margin-top:6px}
  .metric .num.small{font-size:18px}
  .metric.alert .num,.metric.hot .num{color:var(--hot)}
  .metric.warm .num{color:var(--warm)}.metric.cold .num{color:var(--cold)}
  .metric.cita .num{color:var(--green)}
  .metric .bar{height:3px;border-radius:2px;margin-top:11px;background:var(--line);overflow:hidden}
  .metric .bar i{display:block;height:100%}
  .metric.alert .bar i,.metric.hot .bar i{background:var(--hot)}
  .metric.warm .bar i{background:var(--warm)}.metric.cold .bar i{background:var(--cold)}.metric.pipe .bar i{background:var(--gold)}
  .metric.cita .bar i{background:var(--green)}
  .citatag{display:inline-block;font-size:10.5px;font-weight:600;background:var(--green-bg);color:var(--green);padding:2px 8px;border-radius:99px;margin-top:5px}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  .phead{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line)}
  .phead h2{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600}
  .exportbtn{font-size:12.5px;font-weight:600;color:var(--ink-soft);text-decoration:none;padding:8px 13px;border:1px solid var(--line);border-radius:9px;background:#fff}
  .exportbtn:hover{background:#faf8f3}
  table{width:100%;border-collapse:collapse}
  thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;padding:11px 20px;background:#faf8f3;border-bottom:1px solid var(--line)}
  tbody td{padding:13px 20px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle}
  tbody tr{cursor:pointer;transition:background .12s}
  tbody tr:hover{background:#faf8f3}
  tbody tr:last-child td{border-bottom:none}
  .name{font-weight:600}.sub{font-size:12px;color:var(--muted)}

  .temp{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:99px}
  .temp.caliente{color:var(--hot);background:var(--hot-bg)}
  .temp.tibio{color:#a96a10;background:var(--warm-bg)}
  .temp.frio{color:var(--cold);background:var(--cold-bg)}
  .temp .pip{width:7px;height:7px;border-radius:50%;background:currentColor}

  .estado{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:99px;white-space:nowrap}
  .estado.sin_atender{color:var(--hot);background:var(--hot-bg)}
  .estado.en_atencion{color:var(--cold);background:var(--cold-bg)}
  .estado.cerrado{color:var(--green);background:var(--green-bg)}
  .estado.perdido{color:var(--muted);background:#eee}

  .score{display:flex;align-items:center;gap:8px}
  .gauge{width:50px;height:6px;border-radius:4px;background:var(--line);overflow:hidden}
  .gauge i{display:block;height:100%;border-radius:4px}
  .score b{font-family:'Space Grotesk',sans-serif;font-size:13px;min-width:22px}
  .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
  .chip{font-size:10.5px;font-weight:600;background:#fbf3dd;color:var(--gold-deep);padding:2px 8px;border-radius:99px}

  .empty{padding:50px 20px;text-align:center;color:var(--muted)}
  .empty p:first-child{font-family:'Space Grotesk',sans-serif;font-size:16px;color:var(--ink-soft);margin-bottom:6px}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(20,21,26,.45);display:none;align-items:flex-start;justify-content:center;padding:40px 20px;z-index:50}
  .overlay.show{display:flex}
  .modal{background:var(--card);border-radius:18px;width:100%;max-width:580px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.25)}
  .mhead{padding:18px 22px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start}
  .mhead h3{font-family:'Space Grotesk',sans-serif;font-size:18px}
  .mhead .sub{margin-top:3px}
  .close{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;line-height:1}
  .mtabs{display:flex;border-bottom:1px solid var(--line);padding:0 22px}
  .mtab{font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);background:none;border:none;padding:12px 0;margin-right:22px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .mtab.active{color:var(--ink);border-bottom-color:var(--gold)}
  .mscroll{flex:1;overflow-y:auto;min-height:0}

  .profile{display:grid;grid-template-columns:repeat(2,1fr);gap:10px 18px;padding:16px 22px;border-bottom:1px solid var(--line)}
  .profile div span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block}
  .profile div b{font-size:14px;font-weight:600}
  .manage{padding:14px 22px;border-bottom:1px solid var(--line);background:#faf8f3}
  .manage .mrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .manage .mrow:last-child{margin-bottom:0}
  .manage label{font-size:12px;color:var(--muted);font-weight:600;min-width:92px}
  .manage select{font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);flex:1}
  .manage input{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);flex:1}
  .estbtns{display:flex;gap:7px;flex-wrap:wrap}
  .estbtns button{font-family:inherit;font-size:12px;font-weight:600;padding:7px 12px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);cursor:pointer}
  .estbtns button.on{color:#fff}
  .estbtns button.atender.on{background:var(--cold);border-color:var(--cold)}
  .estbtns button.cerrar.on{background:var(--green);border-color:var(--green)}
  .estbtns button.perder.on{background:var(--muted);border-color:var(--muted)}
  .notesbox{padding:14px 22px}
  .notesbox label{font-size:12px;color:var(--muted);font-weight:600;display:block;margin-bottom:6px}
  .notesbox textarea,.notesbox input{font-family:inherit;font-size:13px;width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;margin-bottom:8px;color:var(--ink)}
  .notesbox textarea:focus,.notesbox input:focus{outline:none;border-color:var(--gold)}
  .savenote{font-size:12px;font-weight:600;padding:8px 14px;border-radius:9px;border:none;background:var(--ink);color:#fff;cursor:pointer}

  .chat{padding:16px 16px 20px;background:#e7ddd3;min-height:260px;background-image:radial-gradient(rgba(255,255,255,.5) 1px,transparent 0);background-size:18px 18px}
  .msg{max-width:78%;padding:6px 9px 4px;border-radius:9px;font-size:13.5px;line-height:1.35;margin-bottom:8px;box-shadow:0 1px 1px rgba(0,0,0,.1);position:relative;word-wrap:break-word}
  .msg.user{background:#fff;border-top-left-radius:2px}
  .msg.bot{background:#d9fdd3;margin-left:auto;border-top-right-radius:2px}
  .msg .t{display:block;font-size:10px;color:#667781;margin-top:1px;text-align:right;line-height:1}
  .msg .tick{color:#53bdeb;font-size:10px}

  .actions{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:10px}
  .btn{font-family:inherit;font-size:13px;font-weight:600;padding:10px 16px;border-radius:10px;border:none;cursor:pointer;flex:1}
  .btn.primary{background:var(--ink);color:#fff}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink-soft)}
  .btn:active{transform:translateY(1px)}

  @media (max-width:860px){.metrics{grid-template-columns:repeat(2,1fr)}.hide-sm{display:none}}
</style>
</head>
<body>

<!-- CANDADO DE ACCESO -->
<div id="gate" class="gate">
  <div class="dot">◆</div>
  <h2>CRM Inmobiliario</h2>
  <p>Acceso privado. Escribe la contraseña para entrar.</p>
  <input id="passInput" type="password" placeholder="Contraseña" onkeydown="if(event.key==='Enter')entrar()" />
  <button onclick="entrar()">Entrar</button>
  <p id="gateErr" style="color:var(--hot);margin-top:10px;display:none">Contraseña incorrecta</p>
</div>

<div id="app" class="wrap hidden">
  <header class="top">
    <div class="brand">
      <div class="dot">◆</div>
      <div><h1 id="agencyName">CRM Inmobiliario</h1><p>Gestión de leads · en vivo</p></div>
    </div>
    <div class="updated">Actualizado <b id="clock">—</b> · se refresca solo</div>
  </header>

  <nav class="nav">
    <a class="active" href="/dashboard">Leads</a>
    <a href="/admin">Propiedades</a>
    <a href="/admin#ajustes">Ajustes</a>
  </nav>

  <section class="metrics" id="metrics"></section>

  <div class="panel">
    <div class="phead">
      <h2>Leads por prioridad</h2>
      <a class="exportbtn" id="exportLink" href="#">⬇ Exportar a Excel</a>
    </div>
    <div id="tableHost"><div class="empty"><p>Cargando…</p></div></div>
  </div>
</div>

<!-- Modal de lead -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mhead">
      <div><h3 id="mName">—</h3><p class="sub" id="mPhone">—</p></div>
      <button class="close" onclick="cerrarModal()">×</button>
    </div>
    <div class="mtabs">
      <button class="mtab active" id="mtabChat" onclick="modalTab('chat')">💬 Conversación</button>
      <button class="mtab" id="mtabGest" onclick="modalTab('gest')">⚙️ Gestión</button>
    </div>
    <div class="mscroll">
      <div id="viewChat"><div class="chat" id="mChat"></div></div>
      <div id="viewGest" class="hidden">
        <div class="profile" id="mProfile"></div>
        <div class="manage" id="mManage"></div>
        <div class="notesbox" id="mNotes"></div>
      </div>
    </div>
    <div class="actions" id="mActions"></div>
  </div>
</div>

<script>
  let PASS="",agentesById={},agentesList=[];
  const AH=()=>({"x-admin-password":PASS});
  const JH=()=>({"x-admin-password":PASS,"Content-Type":"application/json"});
  const fmtMXN=(n)=>"$"+(n||0).toLocaleString("es-MX");
  const zonaNombre={polanco:"Polanco",chapultepec:"Lomas/Chapultepec",reforma:"Reforma",condesa:"Condesa/Roma",delvalle:"Del Valle",santafe:"Santa Fe"};
  const tempColor={caliente:"var(--hot)",tibio:"var(--warm)",frio:"var(--cold)"};
  const estadoLabel={sin_atender:"Sin atender",en_atencion:"En atención",cerrado:"Cerrado",perdido:"Perdido"};
  let intervalo=null;

  function aplicarMarca(c){if(!c)return;document.documentElement.style.setProperty('--gold',c);document.documentElement.style.setProperty('--gold-deep',c)}

  async function entrar(){
    PASS=document.getElementById("passInput").value.trim();
    if(!PASS)return;
    const r=await fetch("/api/leads",{headers:AH()});
    if(r.status===401){document.getElementById("gateErr").style.display="block";return;}
    document.getElementById("gate").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("exportLink").href="/api/leads/export?pass="+encodeURIComponent(PASS);
    render(await r.json());
    if(!intervalo)intervalo=setInterval(cargar,15000);
  }

  async function cargar(){
    try{
      const r=await fetch("/api/leads",{headers:AH()});
      if(r.status===401){volverAlGate();return;}
      render(await r.json());
    }catch(e){document.getElementById("tableHost").innerHTML='<div class="empty"><p>No pude conectar con el servidor</p></div>'}
  }
  function volverAlGate(){
    if(intervalo){clearInterval(intervalo);intervalo=null;}
    document.getElementById("app").classList.add("hidden");
    document.getElementById("gate").classList.remove("hidden");
    document.getElementById("gateErr").style.display="block";
  }

  function render(data){
    agentesById=data.agentesById||{};agentesList=data.agentes||[];
    if(data.config?.nombreAgencia)document.getElementById("agencyName").textContent=data.config.nombreAgencia;
    aplicarMarca(data.config?.brandColor);
    pintarMetricas(data.metricas);pintarTabla(data.leads);
    document.getElementById("clock").textContent=new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  }

  function pintarMetricas(m){
    const total=m.total||1;
    document.getElementById("metrics").innerHTML=`
      <div class="metric"><div class="label">Leads totales</div><div class="num">${m.total}</div><div class="bar"><i style="width:100%;background:var(--ink)"></i></div></div>
      <div class="metric alert"><div class="label">🔔 Sin atender</div><div class="num">${m.sinAtender||0}</div><div class="bar"><i style="width:${((m.sinAtender||0)/total*100)}%"></i></div></div>
      <div class="metric hot"><div class="label">🔴 Calientes</div><div class="num">${m.calientes}</div><div class="bar"><i style="width:${(m.calientes/total*100)}%"></i></div></div>
      <div class="metric warm"><div class="label">🟡 Tibios</div><div class="num">${m.tibios}</div><div class="bar"><i style="width:${(m.tibios/total*100)}%"></i></div></div>
      <div class="metric cold"><div class="label">🔵 Fríos</div><div class="num">${m.frios}</div><div class="bar"><i style="width:${(m.frios/total*100)}%"></i></div></div>
      <div class="metric cita"><div class="label">📅 Citas</div><div class="num">${m.citas||0}</div><div class="bar"><i style="width:${((m.citas||0)/total*100)}%"></i></div></div>
      <div class="metric pipe"><div class="label">💰 Pipeline</div><div class="num small">${fmtMXN(m.pipeline)}</div><div class="bar"><i style="width:100%"></i></div></div>`;
  }

  function pintarTabla(leads){
    if(!leads.length){document.getElementById("tableHost").innerHTML='<div class="empty"><p>Aún no hay leads</p><p class="sub">En cuanto un cliente escriba por WhatsApp, aparecerá aquí.</p></div>';return}
    const filas=leads.map((l)=>{
      const agente=l.agenteAsignado?(agentesById[l.agenteAsignado]||"—"):"Sin asignar";
      const zona=l.perfil?.zona?(zonaNombre[l.perfil.zona]||l.perfil.zona):"—";
      const pres=l.perfil?.presupuesto?fmtMXN(l.perfil.presupuesto):"—";
      const est=l.estado||"sin_atender";
      const chips=(l.etiquetas&&l.etiquetas.length)?`<div class="chips">${l.etiquetas.slice(0,3).map(t=>`<span class="chip">${t}</span>`).join("")}</div>`:"";
      const citaTag=l.citaProgramada?`<div><span class="citatag">📅 ${new Date(l.citaProgramada).toLocaleString("es-MX",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})}</span></div>`:"";
      return `<tr onclick='abrirModal("${l.telefono}")'>
        <td><div class="name">${l.nombre||"Sin nombre"}</div><div class="sub">${l.telefono}</div>${chips}${citaTag}</td>
        <td><span class="estado ${est}">${estadoLabel[est]}</span></td>
        <td><span class="temp ${l.temperatura}"><span class="pip"></span>${l.temperatura}</span></td>
        <td><div class="score"><div class="gauge"><i style="width:${l.score}%;background:${tempColor[l.temperatura]}"></i></div><b>${l.score}</b></div></td>
        <td class="hide-sm">${zona}</td>
        <td class="hide-sm">${pres}</td>
        <td class="hide-sm sub">${agente}</td>
      </tr>`;
    }).join("");
    document.getElementById("tableHost").innerHTML=`<table><thead><tr>
      <th>Cliente</th><th>Estado</th><th>Temp.</th><th>Score</th>
      <th class="hide-sm">Zona</th><th class="hide-sm">Presupuesto</th><th class="hide-sm">Asesor</th>
    </tr></thead><tbody>${filas}</tbody></table>`;
  }

  function modalTab(t){
    const chat=t==='chat';
    document.getElementById("mtabChat").classList.toggle("active",chat);
    document.getElementById("mtabGest").classList.toggle("active",!chat);
    document.getElementById("viewChat").classList.toggle("hidden",!chat);
    document.getElementById("viewGest").classList.toggle("hidden",chat);
  }

  async function abrirModal(telefono){
    const r=await fetch("/api/leads/"+telefono,{headers:AH()});
    if(r.status===401){volverAlGate();return;}
    const l=await r.json();
    document.getElementById("mName").textContent=l.nombre||"Sin nombre";
    document.getElementById("mPhone").textContent=l.telefono;
    modalTab('chat'); // siempre abre mostrando la conversación

    const p=l.perfil||{};
    document.getElementById("mProfile").innerHTML=`
      <div><span>Temperatura</span><b style="color:${tempColor[l.temperatura]}">${l.temperatura} (${l.score})</b></div>
      <div><span>Zona</span><b>${p.zona?(zonaNombre[p.zona]||p.zona):"—"}</b></div>
      <div><span>Presupuesto</span><b>${p.presupuesto?fmtMXN(p.presupuesto):"—"}</b></div>
      <div><span>Recámaras</span><b>${p.recamaras||"—"}</b></div>
      <div><span>Propósito</span><b>${p.proposito||"—"}</b></div>
      <div><span>Propiedades enviadas</span><b>${(l.propiedadesEnviadas||[]).length}</b></div>`;

    const est=l.estado||"sin_atender";
    const opts=['<option value="">Sin asignar</option>'].concat(agentesList.map(a=>`<option value="${a.id}" ${l.agenteAsignado===a.id?'selected':''}>${a.nombre}</option>`)).join("");
    document.getElementById("mManage").innerHTML=`
      <div class="mrow"><label>Estado</label><span class="estado ${est}">${estadoLabel[est]}</span></div>
      <div class="mrow"><label>Asignar asesor</label><select onchange="asignar('${l.telefono}',this.value)">${opts}</select></div>
      <div class="mrow"><label>Acción</label>
        <div class="estbtns">
          <button class="atender ${est==='en_atencion'?'on':''}" onclick="setEstado('${l.telefono}','en_atencion')">✋ Atender</button>
          <button class="cerrar ${est==='cerrado'?'on':''}" onclick="setEstado('${l.telefono}','cerrado')">✓ Cerrado</button>
          <button class="perder ${est==='perdido'?'on':''}" onclick="setEstado('${l.telefono}','perdido')">✕ Perdido</button>
        </div>
      </div>
      <div class="mrow"><label>📅 Cita</label>
        <input type="datetime-local" id="leadCita" />
        <button class="savenote" onclick="guardarCita('${l.telefono}')">Guardar</button>
      </div>`;
    document.getElementById("leadCita").value=isoToLocalInput(l.citaProgramada);

    document.getElementById("mNotes").innerHTML=`
      <label>Etiquetas <span style="font-weight:400;color:var(--muted)">(separadas por coma)</span></label>
      <input id="leadTags" placeholder="comprador serio, urgente, inversionista" />
      <label>Notas internas</label>
      <textarea id="leadNotes" rows="2" placeholder="Apuntes del asesor sobre este cliente..."></textarea>
      <button class="savenote" onclick="guardarNotas('${l.telefono}')">Guardar notas</button>`;
    document.getElementById("leadTags").value=(l.etiquetas||[]).join(", ");
    document.getElementById("leadNotes").value=l.notas||"";

    document.getElementById("mChat").innerHTML=(l.historial||[]).map(h=>{
      const hora=new Date(h.ts).toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"});
      const tick=h.rol==='bot'?' <span class="tick">✓✓</span>':'';
      return `<div class="msg ${h.rol}">${h.texto}<span class="t">${hora}${tick}</span></div>`;
    }).join("")||'<p class="empty sub" style="padding:30px">Sin mensajes todavía.</p>';

    const botCtrl=l.humanoEnControl
      ? `<button class="btn primary" onclick="devolverControl('${l.telefono}')">↩ Reactivar bot</button>`
      : `<button class="btn ghost" onclick="tomarControl('${l.telefono}')">Pausar bot</button>`;
    document.getElementById("mActions").innerHTML=`${botCtrl}
      <a class="btn ghost" style="text-decoration:none;text-align:center" href="https://wa.me/${l.telefono}" target="_blank">Escribir por WhatsApp</a>`;
    document.getElementById("overlay").classList.add("show");
  }

  function isoToLocalInput(iso){
    if(!iso)return"";
    const d=new Date(iso);const off=d.getTimezoneOffset()*60000;
    return new Date(d.getTime()-off).toISOString().slice(0,16);
  }
  async function guardarCita(tel){
    const v=document.getElementById("leadCita").value;
    const iso=v?new Date(v).toISOString():null;
    await fetch(`/api/leads/${tel}/cita`,{method:"POST",headers:JH(),body:JSON.stringify({cita:iso})});
    abrirModal(tel);cargar();
  }
  async function asignar(tel,agenteId){await fetch(`/api/leads/${tel}/asignar`,{method:"POST",headers:JH(),body:JSON.stringify({agenteId})});cargar()}
  async function guardarNotas(tel){
    const etiquetas=document.getElementById("leadTags").value.split(",").map(s=>s.trim()).filter(Boolean);
    const notas=document.getElementById("leadNotes").value;
    await fetch(`/api/leads/${tel}/notas`,{method:"POST",headers:JH(),body:JSON.stringify({notas,etiquetas})});cargar();
  }
  async function setEstado(tel,estado){await fetch(`/api/leads/${tel}/estado`,{method:"POST",headers:JH(),body:JSON.stringify({estado})});abrirModal(tel);cargar()}
  async function tomarControl(tel){await fetch(`/api/leads/${tel}/tomar-control`,{method:"POST",headers:AH()});abrirModal(tel);cargar()}
  async function devolverControl(tel){await fetch(`/api/leads/${tel}/devolver-control`,{method:"POST",headers:AH()});abrirModal(tel);cargar()}
  function cerrarModal(){document.getElementById("overlay").classList.remove("show")}
  document.getElementById("overlay").addEventListener("click",e=>{if(e.target.id==="overlay")cerrarModal()});
</script>
</body>
</html>
